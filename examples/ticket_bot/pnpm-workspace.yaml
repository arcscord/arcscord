minimumReleaseAgeExclude:
  - "@arcscord/error@3.0.0"
  - "@arcscord/middleware@1.0.0-next.2"
  - arcscord@1.0.0-next.3
shellEmulator: true
trustPolicy: no-downgrade

allowBuilds:
  "@prisma/engines": true
  better-sqlite3: true
  esbuild: true
  prisma: true
onlyBuiltDependencies:
  - "@prisma/engines"
  - better-sqlite3
  - esbuild
  - prisma
