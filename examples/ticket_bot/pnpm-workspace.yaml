minimumReleaseAgeExclude:
  - "@arcscord/error"
  - "@arcscord/middleware"
  - arcscord
shellEmulator: true
trustPolicy: no-downgrade

allowBuilds:
  "@prisma/engines": true
  better-sqlite3: true
  esbuild: true
  prisma: true
onlyBuiltDependencies:
  - "@prisma/engines"
  - better-sqlite3
  - esbuild
  - prisma
