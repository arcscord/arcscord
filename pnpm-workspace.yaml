minimumReleaseAgeExclude:
  - "@types/node@26.0.0"
shellEmulator: true
confirmModulesPurge: false

trustPolicy: no-downgrade
trustPolicyExclude:
  - chokidar@4.0.3
  - detect-port@1.6.1
  - semver@6.3.1

packages:
  - "packages/*"
  - "test/*"
  - website

overrides:
  ansi-regex: ^5.0.1
  minimist: ^1.2.8

peerDependencyRules:
  allowedVersions:
    tsconfck>typescript: "6"

allowBuilds:
  "@swc/core": true
  core-js: false
  esbuild: true
