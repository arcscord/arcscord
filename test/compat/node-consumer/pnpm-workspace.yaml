shellEmulator: true
confirmModulesPurge: false

trustPolicy: no-downgrade

# The arcscord dep is a freshly-built local `file:` tarball whose bytes (and
# version) change across builds. Skip the content-addressable store name/version
# check so a repacked tarball can't trip
# ERR_PNPM_UNEXPECTED_PKG_CONTENT_IN_STORE against a stale store entry.
strictStorePkgContentCheck: false

overrides:
  "@arcscord/components": file:vendor/components.tgz
  "@arcscord/error": file:vendor/error.tgz
  arcscord: file:vendor/arcscord.tgz

# Keep the error package aligned with the packed Arcscord declarations.
minimumReleaseAgeExclude:
  - "@arcscord/components"
  - arcscord
