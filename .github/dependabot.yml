version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Europe/Zurich
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - security
    commit-message:
      prefix: chore
      prefix-development: chore
      include: scope
    groups:
      security-dependencies:
        applies-to: security-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:30"
      timezone: Europe/Zurich
    open-pull-requests-limit: 0
    labels:
      - dependencies
      - ci
      - security
    commit-message:
      prefix: ci
      include: scope
