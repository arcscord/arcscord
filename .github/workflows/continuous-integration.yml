name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  Linting:
    name: Linting NodeJS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Add problem matchers
        run: echo "::add-matcher::.github/problemMatchers/eslint.json"
      - name: Use Node.js v24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install Dependencies
        id: install
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        id: lint
        run: pnpm lint --fix=false
      - name: Write summary
        if: always()
        run: |
          {
            echo "## Linting"
            echo ""
            echo "| Scope | Command | Result |"
            echo "| --- | --- | --- |"
            echo "| Root workspace | \`pnpm install --frozen-lockfile\` | \`${{ steps.install.outcome }}\` |"
            echo "| Root workspace | \`pnpm lint --fix=false\` | \`${{ steps.lint.outcome }}\` |"
            echo ""
            echo "Example bots are checked by the separate **Example CI** workflow when their folders change."
          } >> "$GITHUB_STEP_SUMMARY"

  Building:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Add problem matchers
        run: echo "::add-matcher::.github/problemMatchers/tsc.json"
      - name: Use Node.js v24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install Dependencies
        id: install
        run: pnpm install --frozen-lockfile
      - name: Build code
        id: build
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        timeout-minutes: 15
      - name: Typecheck code
        id: typecheck
        run: pnpm typecheck
        timeout-minutes: 10
      - name: Pack arcscord for Bun compatibility
        id: pack
        run: pnpm bun:pack --skip-build
      - name: Upload arcscord package
        uses: actions/upload-artifact@v7
        with:
          name: arcscord-package
          path: test/compat/bun-consumer/vendor/arcscord.tgz
          if-no-files-found: error
          retention-days: 1
      - name: Write summary
        if: always()
        run: |
          {
            echo "## Build & Typecheck"
            echo ""
            echo "| Check | Command | Result |"
            echo "| --- | --- | --- |"
            echo "| Install | \`pnpm install --frozen-lockfile\` | \`${{ steps.install.outcome }}\` |"
            echo "| Build | \`pnpm build\` | \`${{ steps.build.outcome }}\` |"
            echo "| Typecheck | \`pnpm typecheck\` | \`${{ steps.typecheck.outcome }}\` |"
            echo "| Pack | \`pnpm bun:pack --skip-build\` | \`${{ steps.pack.outcome }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  UnitTesting:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Use Node.js v24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install Dependencies
        id: install
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        id: test
        run: pnpm test
      - name: Write summary
        if: always()
        run: |
          {
            echo "## Unit Tests"
            echo ""
            echo "| Check | Command | Result |"
            echo "| --- | --- | --- |"
            echo "| Install | \`pnpm install --frozen-lockfile\` | \`${{ steps.install.outcome }}\` |"
            echo "| Test | \`pnpm test\` | \`${{ steps.test.outcome }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  BunCompatibility:
    name: Bun Compatibility
    needs: Building
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7
      - name: Download arcscord package
        uses: actions/download-artifact@v8
        with:
          name: arcscord-package
          path: test/compat/bun-consumer/vendor
      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install consumer dependencies
        working-directory: test/compat/bun-consumer
        run: bun install
      - name: Typecheck consumer
        working-directory: test/compat/bun-consumer
        run: bun run typecheck
      - name: Run smoke test (no login)
        working-directory: test/compat/bun-consumer
        run: bun run smoke
      - name: Run unit tests
        working-directory: test/compat/bun-consumer
        run: bun test
