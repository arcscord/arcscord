name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  Linting:
    name: Linting NodeJS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - name: Add problem matchers
        run: echo "::add-matcher::.github/problemMatchers/eslint.json"
      - name: Use Node.js v24.11.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: pnpm
      - name: Install Dependencies
        id: install
        run: pnpm install --frozen-lockfile
      - name: Run ESLint
        id: lint
        run: pnpm lint --fix=false
      - name: Write summary
        if: always()
        run: |
          {
            echo "## Linting"
            echo ""
            echo "| Scope | Command | Result |"
            echo "| --- | --- | --- |"
            echo "| Root workspace | \`pnpm install --frozen-lockfile\` | \`${{ steps.install.outcome }}\` |"
            echo "| Root workspace | \`pnpm lint --fix=false\` | \`${{ steps.lint.outcome }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  Building:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - name: Add problem matchers
        run: echo "::add-matcher::.github/problemMatchers/tsc.json"
      - name: Use Node.js v24.11.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: pnpm
      - name: Install Dependencies
        id: install
        run: pnpm install --frozen-lockfile
      - name: Build code
        id: build
        run: pnpm build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
        timeout-minutes: 15
      - name: Typecheck code
        id: typecheck
        run: pnpm typecheck
        timeout-minutes: 10
      - name: Pack packages for compatibility & example consumers
        id: pack
        run: pnpm pack:local --skip-build
      - name: Upload compatibility packages
        uses: actions/upload-artifact@v7
        with:
          name: compat-packages
          path: test/compat/vendor/*.tgz
          if-no-files-found: error
          retention-days: 1
      - name: Write summary
        if: always()
        run: |
          {
            echo "## Build & Typecheck"
            echo ""
            echo "| Check | Command | Result |"
            echo "| --- | --- | --- |"
            echo "| Install | \`pnpm install --frozen-lockfile\` | \`${{ steps.install.outcome }}\` |"
            echo "| Build | \`pnpm build\` | \`${{ steps.build.outcome }}\` |"
            echo "| Typecheck | \`pnpm typecheck\` | \`${{ steps.typecheck.outcome }}\` |"
            echo "| Pack | \`pnpm pack:local --skip-build\` | \`${{ steps.pack.outcome }}\` |"
            echo ""
            echo "One build feeds the compatibility (\`bun\`/\`typescript\`/\`node\`) and example jobs via the \`compat-packages\` artifact."
          } >> "$GITHUB_STEP_SUMMARY"

  UnitTesting:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - name: Use Node.js v24.11.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: pnpm
      - name: Install Dependencies
        id: install
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        id: test
        run: pnpm test
      - name: Write summary
        if: always()
        run: |
          {
            echo "## Unit Tests"
            echo ""
            echo "| Check | Command | Result |"
            echo "| --- | --- | --- |"
            echo "| Install | \`pnpm install --frozen-lockfile\` | \`${{ steps.install.outcome }}\` |"
            echo "| Test | \`pnpm test\` | \`${{ steps.test.outcome }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  TypeScriptCompatibility:
    name: TypeScript 5.4 Compatibility
    needs: Building
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7
      - name: Download compatibility packages
        uses: actions/download-artifact@v8
        with:
          name: compat-packages
          path: test/compat/typescript-consumer/vendor
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - name: Use Node.js v24.11.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: pnpm
          # Compatibility consumers intentionally have no lockfile. Reuse the
          # complete workspace lock for the pnpm store cache.
          cache-dependency-path: pnpm-lock.yaml
      - name: Install consumer dependencies
        working-directory: test/compat/typescript-consumer
        run: pnpm install --lockfile=false
      - name: Typecheck packed declarations
        working-directory: test/compat/typescript-consumer
        run: pnpm typecheck

  NodeCompatibility:
    name: Node ESM & CJS Compatibility
    needs: Building
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7
      - name: Download compatibility packages
        uses: actions/download-artifact@v8
        with:
          name: compat-packages
          path: test/compat/node-consumer/vendor
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - name: Use Node.js v24.11.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: pnpm
          # node-consumer installs non-frozen and commits no lockfile; reuse the
          # root lock's pnpm store cache (it already holds discord.js et al.).
          cache-dependency-path: pnpm-lock.yaml
      - name: Install consumer dependencies
        working-directory: test/compat/node-consumer
        run: pnpm install --lockfile=false
      - name: Run ESM smoke (import)
        working-directory: test/compat/node-consumer
        run: pnpm smoke:esm
      - name: Run CJS smoke (require)
        working-directory: test/compat/node-consumer
        run: pnpm smoke:cjs

  BunCompatibility:
    name: Bun Compatibility
    needs: Building
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7
      - name: Download compatibility packages
        uses: actions/download-artifact@v8
        with:
          name: compat-packages
          path: test/compat/bun-consumer/vendor
      - name: Use Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - name: Install consumer dependencies
        working-directory: test/compat/bun-consumer
        run: bun install --no-save
      - name: Typecheck consumer
        working-directory: test/compat/bun-consumer
        run: bun run typecheck
      - name: Run smoke test (no login)
        working-directory: test/compat/bun-consumer
        run: bun run smoke
      - name: Run unit tests
        working-directory: test/compat/bun-consumer
        run: bun test

  Examples:
    name: Example Bot (${{ matrix.name }})
    needs: Building
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Add new example bots here.
          - name: ticket_bot
            path: examples/ticket_bot
          - name: reminder-bot
            path: examples/reminder-bot
          - name: starter-bot
            path: examples/starter-bot
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7
      - name: Download compatibility packages
        uses: actions/download-artifact@v8
        with:
          name: compat-packages
          path: vendor-artifact
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - name: Add ESLint problem matcher
        run: echo "::add-matcher::.github/problemMatchers/eslint.json"
      - name: Add TypeScript problem matcher
        run: echo "::add-matcher::.github/problemMatchers/tsc.json"
      - name: Use Node.js v24.11.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: pnpm
          cache-dependency-path: examples/pnpm-lock.yaml
      - name: Point example at the local repo build
        run: node scripts/link-local-arcscord.mjs ${{ matrix.path }} ${{ github.workspace }}/vendor-artifact
      - name: Install example dependencies
        id: install
        working-directory: ${{ matrix.path }}
        run: pnpm install --lockfile=false
      - name: Generate database client
        id: db_generate
        working-directory: ${{ matrix.path }}
        env:
          DATABASE_URL: file:./prisma/dev.db
        run: |
          if node -e "process.exit(require('./package.json').scripts?.['db:generate'] ? 0 : 1)"; then
            pnpm db:generate
          else
            echo "No db:generate script for this example."
          fi
      - name: Typecheck example
        id: typecheck
        working-directory: ${{ matrix.path }}
        run: pnpm typecheck
      - name: Lint example
        id: lint
        working-directory: ${{ matrix.path }}
        run: pnpm lint
      - name: Write example summary
        if: always()
        run: |
          {
            echo "## Example bot: ${{ matrix.name }}"
            echo ""
            echo "Tested against the **local repo build** of arcscord (packed tarball override)."
            echo ""
            echo "| Check | Command | Result |"
            echo "| --- | --- | --- |"
            echo "| Install | \`pnpm install --lockfile=false\` | \`${{ steps.install.outcome }}\` |"
            echo "| Database client | \`pnpm db:generate\` when available | \`${{ steps.db_generate.outcome }}\` |"
            echo "| Typecheck | \`pnpm typecheck\` | \`${{ steps.typecheck.outcome }}\` |"
            echo "| Lint | \`pnpm lint\` | \`${{ steps.lint.outcome }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
