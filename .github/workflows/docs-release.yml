name: Deploy versioned docs to Pages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Release tag to snapshot, for example v0.3.0. Leave empty to auto-detect every package whose current version has no API snapshot yet."
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release source
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.release_ref || github.ref }}
          fetch-depth: 0
      - name: Checkout docs tools
        uses: actions/checkout@v7
        with:
          ref: main
          path: docs-tools
          fetch-depth: 1
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup Node.js v24.11.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Build code
        run: pnpm build
      - name: Resolve release ref name
        # Empty on a manual run without a tag, which switches the resolver to
        # auto-detect mode (every package whose version has no snapshot yet).
        run: echo "RELEASE_REF_NAME=${{ github.event.inputs.release_ref || github.event.release.tag_name }}" >> "$GITHUB_ENV"
      - name: Resolve release API packages
        id: release-packages
        run: node docs-tools/scripts/resolve-release-doc-packages.mjs --source-root .
      - name: Generate release API docs
        if: steps.release-packages.outputs.packages != ''
        run: node docs-tools/scripts/generate-api-docs.mjs --source-root . --output-root . --channel release --packages "${{ steps.release-packages.outputs.packages }}"
      - name: Preserve release API snapshots
        if: steps.release-packages.outputs.packages != ''
        env:
          RELEASE_PACKAGES: ${{ steps.release-packages.outputs.packages }}
        run: |
          rm -rf /tmp/arcscord-release-api
          node docs-tools/scripts/copy-release-api-snapshots.mjs /tmp/arcscord-release-api
      - name: Move release API snapshots to main
        if: steps.release-packages.outputs.packages != ''
        run: |
          git reset --hard
          git clean -fd website/static/api
          git fetch origin main:refs/remotes/origin/main
          if git show-ref --verify --quiet refs/heads/main; then
            git switch main
            git reset --hard origin/main
          else
            git switch --create main origin/main
          fi
          cp -R /tmp/arcscord-release-api/website/static/api/. website/static/api/
      - name: Install main dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate dev API docs
        run: pnpm docs:api
      - name: Commit release API snapshots
        env:
          SNAPSHOT_LABEL: ${{ steps.release-packages.outputs.label }}
        run: |
          if [ -z "$(git status --porcelain --untracked-files=all website/static/api)" ]; then
            echo "No release API snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/static/api
          git commit -m "docs(api): add API snapshots [skip ci]" -m "${SNAPSHOT_LABEL}"
          git push origin HEAD:main
      - name: Build docs site
        run: pnpm --filter @arcscord/website build
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./website/build
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
