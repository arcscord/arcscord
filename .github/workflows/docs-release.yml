name: Deploy versioned docs to Pages

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_ref:
        description: "Release tag or ref to snapshot, for example v0.3.0. Leave empty to use the selected workflow ref."
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.release_ref || github.ref }}
          fetch-depth: 0
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Build code
        run: pnpm build
      - name: Generate release API docs
        run: pnpm docs:api:release
      - name: Resolve release ref name
        run: echo "RELEASE_REF_NAME=${{ github.event.inputs.release_ref || github.ref_name }}" >> "$GITHUB_ENV"
      - name: Preserve release API snapshots
        run: tar --exclude="*/dev.json" --exclude="manifest.json" -cf /tmp/arcscord-release-api.tar website/static/api
      - name: Move release API snapshots to main
        run: |
          git reset --hard
          git clean -fd website/static/api
          git fetch origin main
          git switch main
          tar -xf /tmp/arcscord-release-api.tar
      - name: Generate dev API docs
        run: pnpm docs:api
      - name: Commit release API snapshots
        run: |
          if [ -z "$(git status --porcelain --untracked-files=all website/static/api)" ]; then
            echo "No release API snapshot changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add website/static/api
          git commit -m "docs(api): add API snapshots for ${RELEASE_REF_NAME} [skip ci]"
          git push origin HEAD:main
      - name: Build docs site
        run: pnpm --filter @arcscord/website build
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./website/build
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
