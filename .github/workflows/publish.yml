name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: the package to publish
        required: true
        type: choice
        options:
          - arcscord
          - middleware
          - cli
          - error
          - better_error
      tag:
        description: the version tag to publish
        required: false
        type: string

jobs:
  Publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Project
        uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v6
      - name: Use Node.js v24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Clean build artifacts
        run: pnpm clean
      - name: Build code
        run: pnpm build
      - name: Lint code
        run: pnpm lint --fix=false
      - name: Typecheck code
        run: pnpm typecheck
      - name: Run unit tests
        run: pnpm test
      - name: Validate package contents
        run: pnpm pack --pack-destination /tmp
        working-directory: "packages/${{inputs.package}}"
      - name: Publish
        run: |
          if [ -n "$PUBLISH_TAG" ]; then
            pnpm publish --provenance --access public --no-git-checks --tag "$PUBLISH_TAG"
          else
            pnpm publish --provenance --access public --no-git-checks
          fi
        working-directory: "packages/${{inputs.package}}"
        env:
          PUBLISH_TAG: ${{ inputs.tag }}
          NODE_AUTH_TOKEN: ${{secrets.NPM_SECRET}}
