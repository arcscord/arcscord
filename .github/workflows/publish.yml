name: Publish

on:
  workflow_dispatch:
    inputs:
      package:
        description: the package to publish
        required: true
        type: choice
        options:
          - arcscord
          - middleware
          - error
          - better_error
          - create-arcscord-bot
      tag:
        description: the version tag to publish
        required: false
        type: string

jobs:
  Publish:
    name: Build & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Project
        uses: actions/checkout@v7
      - name: Guard prerelease publishes without a dist-tag
        run: |
          VERSION=$(grep -m1 '"version"' "packages/${{ inputs.package }}/package.json" | sed -E 's/.*"version": *"([^"]+)".*/\1/')
          if [[ "$VERSION" == *-* && -z "$PUBLISH_TAG" ]]; then
            echo "::error::Version $VERSION looks like a prerelease but no dist-tag (tag input) was provided. Refusing to publish to 'latest'."
            exit 1
          fi
        env:
          PUBLISH_TAG: ${{ inputs.tag }}
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.8.0
      - name: Use Node.js v24.11.0
        uses: actions/setup-node@v6
        with:
          node-version: 24.11.0
          cache: pnpm
          registry-url: "https://registry.npmjs.org"
      - name: Install Dependencies
        run: pnpm install --frozen-lockfile
      - name: Pin arcscord version
        if: ${{ inputs.package == 'create-arcscord-bot' }}
        run: |
          if [ -n "$PUBLISH_TAG" ]; then
            VERSION=$(npm view "arcscord@$PUBLISH_TAG" version)
          else
            VERSION=$(npm view arcscord version)
          fi
          echo "Pinning arcscord@$VERSION for generated projects"
          cat > packages/create-arcscord-bot/src/arcscord-version.ts <<EOF
          // Pinned automatically at publish time (see .github/workflows/publish.yml).
          export const ARCSCORD_VERSION = "$VERSION";
          EOF
        env:
          PUBLISH_TAG: ${{ inputs.tag }}
      - name: Clean build artifacts
        run: pnpm clean
      - name: Build code
        run: pnpm build
      - name: Lint code
        run: pnpm lint --fix=false
      - name: Typecheck code
        run: pnpm typecheck
      - name: Run unit tests
        run: pnpm test
      - name: Validate package contents
        run: pnpm pack --pack-destination /tmp
        working-directory: "packages/${{inputs.package}}"
      - name: Publish
        run: |
          if [ -n "$PUBLISH_TAG" ]; then
            pnpm publish --provenance --access public --no-git-checks --tag "$PUBLISH_TAG"
          else
            pnpm publish --provenance --access public --no-git-checks
          fi
        working-directory: "packages/${{inputs.package}}"
        env:
          PUBLISH_TAG: ${{ inputs.tag }}
